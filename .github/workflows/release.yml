name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Update version from tag
        shell: bash
        run: |
          # Extract version from tag (e.g., v2.1 -> 2.1)
          VERSION="${GITHUB_REF_NAME#v}"
          
          # If it's a 2-part version (like 2.1), normalize it to 3-part (2.1.0) for semver compatibility
          if [[ $VERSION =~ ^[0-9]+\.[0-9]+$ ]]; then
            VERSION="$VERSION.0"
          fi
          
          echo "Syncing files to version $VERSION"
          
          # Update package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          
          # Update tauri.conf.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          
          # Update Cargo.toml (first occurrence of 'version = ...')
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$VERSION\"/}" src-tauri/Cargo.toml

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Bloom ${{ github.ref_name }}"
          releaseDraft: false
          releasePrerelease: false
