name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Bloom ${{ github.ref_name }}"
          releaseBody: |
            ## Bloom v2.0.0 Refined Edition
            
            This major update transforms Bloom into a fully configurable, native-feeling Windows utility.
            
            ### New Features
            - **Floating Settings Panel**: A beautiful, translucent settings hub that syncs in real-time.
            - **Windows Mica Integration**: Modern Windows 11 blur effects on the settings window.
            - **Dynamic Side-Content**: The Island now intelligentlly shrinks and expands based on active visualizers/artwork.
            - **OLED Screen Corners**: Passive rounded screen edges (toggleable and persistent).
            - **Enhanced Privacy**: Globally disabled browser context menus for a truly native feel.
            - **Aggressive OSD Suppression**: Improved background hunter that kills the native Windows volume HUD instantly.
            
            ### Improvements
            - Stable inter-window communication (broadcast system).
            - Excluded Windows Desktop from fullscreen detection (no more accidental hiding).
            - High-resolution icon pack with transparency.
            
            Enjoy the new Bloom!
          releaseDraft: false
          releasePrerelease: false
